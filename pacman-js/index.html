<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Pac-Man</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="game-shell">
        <header class="hud">
            <h1>Pac-Man</h1>
            <div class="stats">
                <span>Score: <strong id="score">0</strong></span>
                <span>Lives: <strong id="lives">3</strong></span>
            </div>
        </header>

        <canvas id="game" aria-label="Pac-Man game board"></canvas>

        <section class="controls">
            <p id="status">Use arrow keys or WASD to move.</p>
            <button id="restart" type="button">Restart Game</button>
        </section>
    </main>

    <script src="game.js"></script>
</body>

</html>
